<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>GitHub Issues Tracker | Log In</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind Css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- custom css -->
     <link rel="stylesheet" href="style.css">
    <!--Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="body">
    <!-- Header section Stared -->
    <header class="bg-base-100 shadow-sm">
        <div class="navbar w-11/12 mx-auto py-5">
  <div class="flex items-center gap-5 flex-1">
    <img class="w-12 cursor-pointer" src="./assets/github-logo.png" alt="">
    <h2 class="text-2xl font-semibold text-[#1F2937] cursor-pointer">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered outline-none w-24 md:w-auto" />
    <button class="btn btn-primary">+ New Issue</button>
  </div>
</div>
    </header>
  <!-- Header section ended -->
 <!-- Btn Section Started -->
  <section class="w-10/12 mx-auto mt-20 bg-white p-5 shadow rounded-xl">
    <div class="flex gap-3">
        <button class="btn btn-primary">All</button>
        <button class="btn btn-outline">Open</button>
        <button class="btn btn-outline">Closed</button>
    </div>
  </section>
</body>
</html>
