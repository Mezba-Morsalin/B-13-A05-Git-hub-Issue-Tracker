<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>GitHub Issues Tracker | Log In</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind Css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- custom css -->
     <link rel="stylesheet" href="style.css">
    <!--Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Font Awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="body">
    <!-- Header section Stared -->
    <header class="bg-base-100 shadow-sm">
        <div class="navbar w-11/12 mx-auto py-5">
  <div class="flex items-center gap-5 flex-1">
    <img class="w-12 cursor-pointer" src="./assets/github-logo.png" alt="">
    <h2 class="text-2xl font-semibold text-[#1F2937] cursor-pointer">GitHub Issues Tracker</h2>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered outline-none w-24 md:w-auto" />
    <button class="btn btn-primary">+ New Issue</button>
  </div>
</div>
    </header>
  <!-- Header section ended -->
 <!-- Btn Section Started -->
  <section class="w-10/12 mx-auto mt-20 bg-white p-5 shadow rounded-xl">
    <div class="flex gap-3">
        <button class="btn btn-primary">All</button>
        <button class="btn btn-outline">Open</button>
        <button class="btn btn-outline">Closed</button>
    </div>
  </section>
  <!-- Btn Section Ended -->
  <!-- Issue Section Stared -->
  <section class="w-10/12 mx-auto mt-5 bg-white p-5 shadow rounded-xl">
    <div class="flex flex-col md:flex-row justify-between gap-7">
        <div class="flex gap-3 items-center">
       <div>
        <img src="./assets/Aperture.png" alt="">
       </div>
       <div>
        <h3 class="text-2xl font-semibold text-[#1F2937]">50 Issues</h3>
       <p class="text-base leading-6 text-[#64748B]">Track and manage your project issues</p>
       </div>
    </div>
    <div class="flex gap-3 items-center">
        <div class="bg-green-700 w-4 h-4 rounded-full"></div>
        <p>Open</p>
        <div class="bg-purple-600 w-4 h-4 rounded-full"></div>
        <p>Closed</p>
    </div>
    </div>
  </section>
  <!-- Issue Section Ended-->
  <!-- Issue Cards Section Started -->
  <section class="w-10/12 mx-auto bg-base-200 mt-1 shadow p-6 rounded-xl">
    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-5">
      <div class="issue-cards bg-white p-4 shadow rounded-xl space-y-4">
        <div class="flex justify-between items-center">
          <div>
            <img src="./assets/Open-Status.png" alt="">
          </div>
          <div>
            <p class="bg-red-200 text-red-500 rounded-full btn cursor-none w-24 text-center">High</p>
          </div>
        </div>
        <h3 class="text-xl font-semibold text-[#1F2937]">Fix navigation menu on mobile devices</h3>
        <p class="text-base leading-6 text-[#64748B] line-clamp-2">The navigation menu doesn't collapse properly on mobile devices...</p>
        <div class="flex gap-3">
          <button class="bg-red-200 text-red-500 border border-red-500 rounded-full w-24 inline-flex items-center justify-center gap-1"><i class="fa-solid fa-bug"></i>BUG</button>
          <button class="bg-yellow-100 text-orange-500 border border-yellow-500 btn cursor-none rounded-full w-40 inline-flex items-center justify-center gap-1"><i class="fa-regular fa-life-ring"></i>HELP WANTED</button>
        </div>
        <p class="text-base leading-6 text-[#64748B]">#1 by john_doe</p>
        <p class="text-base leading-6 text-[#64748B]">1/15/2024</p>
      </div>
    </div>
  </section>
  <!-- Issue Cards Section Ended -->
   <script src="./script/dashboard.js"></script>
</body>
</html>
