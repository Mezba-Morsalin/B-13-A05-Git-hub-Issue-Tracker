<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Log In</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind Css -->
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Daisy UI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <!-- custom css -->
     <link rel="stylesheet" href="style.css">
    <!--Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
     <section class="bg-white lg:w-[580px] mx-auto h-screen shadow-xl">
        <div class="text-center pt-16">
            <img class="mx-auto mb-5" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl font-semibold text-[#1F2937] mb-1">GitHub Issues Tracker</h2>
            <p class="text-base leading-6 text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset bg-white border-base-300 rounded-box w-xs border p-4 mx-auto mt-10">

        <label class="label text-base text-[#1F2937]">Username</label>
        <input id="username" type="text" class="input outline-none border-[1px] border-t-slate-400" placeholder="Enter Username" />

        <label class="label text-base text-[#1F2937]">Password</label>
        <input id="password" type="password" class="input border-[1px] border-t-slate-400 outline-none " placeholder="Password" />

        <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
        <div class="space-y-6">
            <p class="text-base text-center leading-6 text-[#64748B] mt-5">OR</p>
            <p class="text-base text-center leading-6 text-[#64748B]">Demo Credentials:</p>
            <div class="card bg-base-300 w-96 shadow-sm mx-auto">
  <div class="card-body text-center">
    <h2 class=""><span class="font-semibold text-[#1F2937]">Username : </span>admin</h2>
    <h2 ><span class="font-semibold text-[#1F2937]">Password : </span>admin123</h2>
  </div>
</div>
        </div>
    </section> 
    <script src="./script/script.js"></script>
</body>
</html>
